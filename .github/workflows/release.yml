name: Build And Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.2.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Create or update GitHub release
        shell: pwsh
        run: |
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --target $env:GITHUB_SHA --generate-notes
          }

          $assets = Get-ChildItem -Path release -Filter *.exe -File
          if (-not $assets) {
            throw "No .exe assets found in the release output directory."
          }

          foreach ($asset in $assets) {
            gh release upload $env:RELEASE_TAG $asset.FullName --clobber
          }
